name: dbt CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt_finance_variance
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt-duckdb
        run: pip install dbt-duckdb

      - name: Set up dbt profile
        run: cp profiles.example.yml profiles.yml

      - name: dbt build (seed + models + tests)
        env:
          DBT_PROFILES_DIR: .
        run: dbt build
